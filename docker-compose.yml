services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vlr_predict
      POSTGRES_USER: vlr
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vlr -d vlr_predict"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vlr:${DB_PASSWORD:-changeme}@db:5432/vlr_predict
      DATABASE_URL_SYNC: postgresql://vlr:${DB_PASSWORD:-changeme}@db:5432/vlr_predict
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./models:/app/models

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  worker:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "app.scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://vlr:${DB_PASSWORD:-changeme}@db:5432/vlr_predict
      DATABASE_URL_SYNC: postgresql://vlr:${DB_PASSWORD:-changeme}@db:5432/vlr_predict
    volumes:
      - ./models:/app/models

volumes:
  pgdata:
